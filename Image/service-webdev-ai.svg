<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">AI Web Development Illustration</title>
  <desc id="desc">Abstract browser window with code symbols and glowing elements.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFEAD8"/>
      <stop offset="100%" stop-color="#FFD1B0"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF4EA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#C45B36" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="1020" cy="140" r="120" fill="#FFC89F" opacity="0.65"/>
  <circle cx="160" cy="690" r="150" fill="#FFBE90" opacity="0.6"/>
  <g filter="url(#shadow)">
    <rect x="160" y="120" width="880" height="560" rx="36" fill="url(#card)"/>
    <rect x="160" y="120" width="880" height="78" rx="36" fill="#FF7A4A"/>
    <circle cx="220" cy="158" r="11" fill="#FFF3EB"/>
    <circle cx="255" cy="158" r="11" fill="#FFD9C5"/>
    <circle cx="290" cy="158" r="11" fill="#FFC0A2"/>
  </g>
  <rect x="230" y="250" width="420" height="80" rx="16" fill="#FFE2CF"/>
  <rect x="230" y="360" width="300" height="30" rx="15" fill="#FFD3B8"/>
  <rect x="230" y="410" width="350" height="30" rx="15" fill="#FFD3B8"/>
  <rect x="230" y="460" width="240" height="30" rx="15" fill="#FFD3B8"/>
  <rect x="700" y="250" width="270" height="300" rx="28" fill="#FFF" stroke="#FFD5BC" stroke-width="6"/>
  <path d="M775 360 L735 400 L775 440" fill="none" stroke="#D55C35" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M895 360 L935 400 L895 440" fill="none" stroke="#D55C35" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="810" y1="450" x2="860" y2="350" stroke="#F08A5D" stroke-width="18" stroke-linecap="round"/>
</svg>
